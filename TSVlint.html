<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSV Linter</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style_CSV.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
  <script src="js/navbar.js" type="text/javascript" defer></script>
</head>

<body>
  <navbar-header>TSVlint.html</navbar-header>

  <div style="
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      ">
    <label for="TSV Delimiter" style="margin-bottom: 0px">TSV Delimiter:</label>
    <select type="text" id="delimiter" style="width: 200px; height: 20px; text-align: center">
      <option value="Normal tab">Normal tab</option>
      <option value="\t">\t</option>
    </select>
  </div>

  <div id="editor-container">
    <div id="editor"></div>
    <div id="resizer"></div>
  </div>
  <div class="button-container">
    <button onclick="lintTSV()" class="btn btn-primary">Validate TSV</button>
  </div>

  <!-- <button onclick="lintJSON()" class="btn btn-primary">Validate JSON</button> -->
  <div id="output"></div>
  <!-- <button onclick="lintJSON()">Lint JSON</button>
    <div id="output"></div> -->
</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="js/script_TSV.js"></script>

</html>
