<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Linter</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style_CSV.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
  <script src="js/navbar.js" type="text/javascript" defer></script>
</head>

<body>
  <navbar-header>Customlint.html</navbar-header>

  <div style="
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      ">
    <label for="Custom Delimiter" style="margin-bottom: 0px">Custom Delimiter:</label>
    <input type="text" maxlength="2" id="delimiter" style="width: 50px; height: 20px; text-align: center" />
  </div>

  <div id="editor-container">
    <div id="editor"></div>
    <div id="resizer"></div>
  </div>
  <div class="button-container">
    <button id="custom-validate" onclick="lintCustom()" class="btn btn-primary" disabled>
      Validate Custom
    </button>
  </div>

  <!-- <button onclick="lintJSON()" class="btn btn-primary">Validate JSON</button> -->
  <div id="output"></div>
  <!-- <button onclick="lintJSON()">Lint JSON</button>
    <div id="output"></div> -->
</body>
<script src="js/script_Custom.js"></script>

</html>
